<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Rotina Semanal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 95%;
      max-width: 1000px;
      border-radius: 10px;
      overflow: hidden;
    }

    caption {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    th, td {
      border: 1px solid #333;
      padding: 12px;
      text-align: center;
    }

    /* Cabeçalho */
    thead th {
      background-color: #2c3e50;
      color: white;
    }

    /* Primeira coluna (MANHÃ, TARDE, NOITE) */
    tbody th {
      background-color: #34495e;
      color: white;
    }

    /* células normais */
    tbody td {
      background-color: #ffc400;
      color: #2c3e50;
    }
    

    tr:hover td {
      background-color: #ffeb3b;
    }
  </style>
</head>

<body>

  <h1>Minha Rotina Semanal</h1>

  <table>
    <caption>Rotina Semanal</caption>

    <thead>
      <tr>
        <th></th>
        <th>DOM</th>
        <th>SEG</th>
        <th>TER</th>
        <th>QUA</th>
        <th>QUI</th>
        <th>SEX</th>
        <th>SAB</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <th>MANHÃ</th>
        <td>Academia</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Academia</td>
      </tr>

      <tr>
        <th>TARDE</th>
        <td>Estudos</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Trabalho</td>
        <td>Freelas</td>
      </tr>

      <tr>
        <th>NOITE</th>
        <td>Netflix</td>
        <td>Faculdade</td>
        <td>Faculdade</td>
        <td>Faculdade</td>
        <td>Faculdade</td>
        <td>Faculdade</td>
        <td>Estudos</td>
      </tr>
    </tbody>

  </table>

</body>
</html>
