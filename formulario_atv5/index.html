<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .form {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .full {
      grid-column: span 2;
    }

    input, select, textarea {
      margin-top: 5px;
      padding: 10px;
      border: 0;
      border-bottom: 1px solid #ccc;
      transition: 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 4px 5px rgba(79,70,229,0.4);
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 5px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3730a3;
      transform: scale(1.02);
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <form class="form">

      <h2>Cadastro</h2>

      <div class="grid">

        <div class="field">
          <label>Nome</label>
          <input type="text" required>
        </div>

        <div class="field">
          <label>E-mail</label>
          <input type="email" required>
        </div>

        <div class="field">
          <label>Senha</label>
          <input type="password" required>
        </div>

        <div class="field">
          <label>Data de nascimento</label>
          <input type="date" required>
        </div>

        <div class="field">
          <label>Curso</label>
          <select>
            <option>Engenharia de Software</option>
            <option>ADS</option>
            <option>Ciência da Computação</option>
          </select>
        </div>

        <div class="field">
          <label>Sexo</label>
          <select>
            <option>Masculino</option>
            <option>Feminino</option>
            <option>Outro</option>
          </select>
        </div>

        <div class="field full">
          <label>Interesses</label>
          <div class="checks">
            <label><input type="checkbox"> Front-end</label>
            <label><input type="checkbox"> Back-end</label>
            <label><input type="checkbox"> Mobile</label>
            <label><input type="checkbox"> IA</label>
          </div>
        </div>

        <div class="field full">
          <label>Comentários</label>
          <textarea rows="4"></textarea>
        </div>

        <div class="field full">
          <label>Upload de foto</label>
          <input type="file">
        </div>

      </div>

      <button type="submit">Enviar</button>

    </form>
  </div>

</body>
</html>
